# Build distributable desktop executables for Windows, macOS, and Linux and
# attach them to a GitHub Release. Trigger: push a tag like v0.1.0
#   git tag v0.1.0 && git push origin v0.1.0
# or run manually from the Actions tab (artifacts only, no release).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Python dependencies (CPU torch)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python packaging/build.py

      - uses: actions/upload-artifact@v4
        with:
          name: production-rag-${{ matrix.os }}
          path: production-rag-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: production-rag-*.zip
